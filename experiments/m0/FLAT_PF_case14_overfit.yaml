  input_bus_dim: 15
  input_gen_dim: 6
  output_bus_dim: 2
  output_gen_dim: 1
  num_layers: 6
optimizer:
  beta1: 0.9
  beta2: 0.999
  learning_rate: 0.001
  lr_decay: 0.7
  lr_patience: 100
seed: 0
training:
  batch_size: 16
  epochs: 1500
  loss_weights:
  - 1.0
  losses:
  - MaskedBusMSE
  loss_args:
  - {}
  accelerator: cpu
  devices: auto
  strategy: auto
verbose: false
