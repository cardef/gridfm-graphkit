callbacks:
  patience: 1500
  tol: 0
task:
  task_name: PowerFlow
data:
  baseMVA: 100
  mask_value: 0.0
  normalization: HeteroDataMVANormalizer
  networks:
  - case14_ieee
  scenarios:
  - 64
  test_ratio: 0.05
  val_ratio: 0.05
  workers: 0
  split_by_load_scenario_idx: true
  hierarchy:
    enable: false
model:
  type: GNS_heterogeneous
  attention_head: 4
  edge_dim: 10
