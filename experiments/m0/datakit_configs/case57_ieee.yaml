network:
  name: case57_ieee
  source: pglib
  network_dir: ../gridfm-datakit/scripts/grids
load:
  generator: agg_load_profile
  agg_profile: default
  scenarios: 2048
  sigma: 0.2
  change_reactive_power: true
  global_range: 0.4
  max_scaling_factor: 4.0
  step_size: 0.1
  start_scaling_factor: 1.0
topology_perturbation:
  type: none
generation_perturbation:
  type: none
admittance_perturbation:
  type: none
settings:
  num_processes: 6
  data_dir: data
  large_chunk_size: 512
  overwrite: true
  mode: pf
  include_dc_res: true
  enable_solver_logs: false
  pf_fast: true
  dcpf_fast: true
  max_iter: 200
  seed: 0
